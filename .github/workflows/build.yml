name: Build and Push Docker Image

on:
  # Trigger manually from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      opencode_version:
        description: 'OpenCode Desktop version to build (e.g. v1.14.28)'
        required: false
        default: ''
        type: string
      push_image:
        description: 'Push image to registry'
        required: false
        default: true
        type: boolean

  # Trigger on pushes to main that modify relevant files
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'root/**'
      - '.github/workflows/build.yml'

  # Scheduled check every day at 06:00 UTC
  schedule:
    - cron: '0 6 * * *'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Opt into Node.js 24 for actions to suppress deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      build_needed: ${{ steps.check.outputs.build_needed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get current version from Dockerfile
        id: current
        run: |
          CURRENT=$(grep 'ARG OPENCODE_VERSION=' Dockerfile | head -1 | sed 's/.*=//')
          echo "version=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT"

      - name: Get latest OpenCode release
        id: latest
        run: |
          if [ -n "${{ github.event.inputs.opencode_version }}" ]; then
            LATEST="${{ github.event.inputs.opencode_version }}"
          else
            LATEST=$(curl -s https://api.github.com/repos/anomalyco/opencode/releases/latest | jq -r '.tag_name')
          fi
          echo "version=$LATEST" >> $GITHUB_OUTPUT
          echo "Target version: $LATEST"

      - name: Check if build is needed
        id: check
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          LATEST="${{ steps.latest.outputs.version }}"
          if [ "$CURRENT" != "$LATEST" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "push" ]; then
            echo "build_needed=true" >> $GITHUB_OUTPUT
            echo "Build needed: $CURRENT -> $LATEST"
          else
            echo "build_needed=false" >> $GITHUB_OUTPUT
            echo "No build needed. Already at $CURRENT"
          fi

      - name: Update Dockerfile version
        if: steps.check.outputs.build_needed == 'true'
        run: |
          sed -i "s/ARG OPENCODE_VERSION=.*/ARG OPENCODE_VERSION=${{ steps.latest.outputs.version }}/" Dockerfile

      - name: Commit version update
        if: steps.check.outputs.build_needed == 'true' && github.event_name == 'schedule'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Dockerfile
          git commit -m "chore: bump OpenCode Desktop to ${{ steps.latest.outputs.version }}"
          git push

      - name: Output version for build
        id: get-version
        run: |
          if [ "${{ steps.check.outputs.build_needed }}" = "true" ]; then
            echo "version=${{ steps.latest.outputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ steps.current.outputs.version }}" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    needs: check-release
    if: needs.check-release.outputs.build_needed == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            targetarch: amd64
          - platform: linux/arm64
            targetarch: arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: ${{ github.event.inputs.push_image != 'false' }}
          no-cache: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.targetarch }}-${{ needs.check-release.outputs.version }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.check-release.outputs.version }}
          build-args: |
            OPENCODE_VERSION=${{ needs.check-release.outputs.version }}
            TARGETARCH=${{ matrix.targetarch }}

  create-manifest:
    needs: [check-release, build-and-push]
    if: always() && needs.build-and-push.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create manifest list and push
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          
          docker buildx imagetools create \
            -t "$IMAGE:latest" \
            -t "$IMAGE:$VERSION" \
            "$IMAGE:amd64-$VERSION" \
            "$IMAGE:arm64-$VERSION"

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.check-release.outputs.version }}

  notify:
    needs: [check-release, build-and-push]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify on build status
        run: |
          if [ "${{ needs.build-and-push.result }}" = "success" ]; then
            echo "✅ Build successful for OpenCode Desktop ${{ needs.check-release.outputs.version }}"
          else
            echo "❌ Build failed"
            exit 1
          fi
